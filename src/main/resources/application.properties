spring.application.name=flor-de-lotus

# Ativa o perfil padrao
# prod = mysql
# dev = H2 database
spring.profiles.active=prod

server.error.include-message=always
server.error.include-binding-errors=always

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

jwt.validity=3600000
jwt.secret=${JWT_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

url.frontend=${URL_FRONTEND}

microservico.arquivos.url=${URL_MICROSERVICO_ARQUIVOS:http://localhost:8081}

aws.s3.bucket=${AWS_S3_BUCKET:microservico-202605}
aws.s3.region=${AWS_REGION:us-east-1}