# Banco MySQL (produ��o)
spring.datasource.url=${URL_DATABASE:jdbc:mysql://localhost:3306/flor_de_lotus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Schema com as views
spring.sql.init.schema-locations=classpath:schema.sql

# URL do microservico de arquivos
microservico.arquivos.url=${URL_MICROSERVICO_ARQUIVOS:http://localhost:8081}
# Cache Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=PT5M
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=app::
spring.data.redis.host=${HOST_REDIS:localhost}
spring.data.redis.port=6379

# Logging Cache
logging.level.org.springframework.cache.interceptor.CacheInterceptor=TRACE
